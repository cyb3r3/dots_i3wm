# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 5
	separator = " : "

	
}

#order += "ipv4"
#order += "disk /"
order += "load"
order += "memory"
order += "volume master"
order += "wireless _first_"
order += "ethernet _first_"
order += "tztime local"
order += "battery all"

wireless _first_ {
        format_up = "[  ON ]"
        format_down = "[   ]"
}

ethernet _first_ {
        format_up = "[ E: ON ]"
        format_down = "[ E: OFF ]"
}

battery all {
        format = "[ %status %percentage ]"
	last_full_capacity = "true"
        status_chr = " "
        status_bat = ""
	status_full = ""
}

volume master {
        format = "[  %volume ]"
	format_muted = "[  ]"
}

disk "/" {
        format = ""
}

load {
        format = "[  %1min ]"
}

memory {
        format = "[ Mem: %used ]"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "[  %h %d /  %H:%M ]"
}

general {
  output_format = "i3bar"
  colors = true
  color_good = "#6E5AD6"
  color_degraded = "#4A4654"
  color_bad = "#D38C26"

  separator = " : "
}

