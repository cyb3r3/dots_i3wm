# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ├θ
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 5
	separator = ""
	output_format = "i3bar"
    	color_good = "#6E5AD6"
    	color_degraded = "#4A4654"
    	color_bad = "#D38C26"
}

#order += "ipv4"
#order += "disk /"


order += "volume master"
order += "wireless _first_"
order += "ethernet _first_"
order += "tztime local"

order += "battery 0"
order += "battery 1"
order += "cpu_temperature 0"
order += "load"
order += "memory"

wireless _first_ {
        format_up = "[ΎΘτ ON]"
        format_down = "::ΎΘτ ΎΑΞ::"
}

ethernet _first_ {
        format_up = "[≤░ΙΑ ON]"
        format_down = "::≤░ΙΑ ΎΑΞ::"
}

battery 0 {
        format = "[0 %status %percentage]"
	last_full_capacity = "true"
        status_chr = "ΎΔπ "
        status_bat = "ΎΚΑ"
	status_full = "ΎΖΛ"
		
}

battery 1 {

	format = "[1 %status %percentage]"
	last_full_capacity = "true"
        status_chr = "ΎΔπ"
        status_bat = "ΎΚΑ"
	status_full = "ΎΖΛ"

}
volume master {
        format = "[ΎΑρ %volume]"
	format_muted = "::ΎΑρ ΎΑΞ::"

}

disk "/" {
        format = ""
}

load {
        format = "[ΎΔΘ %1min]"
	
}

memory {
        format = "[≤░αγ %used]"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "[%D|%H:%M]"
}

cpu_temperature 0 {
    format = "[ΎΜΘ %degrees┬░C]"
    path = "/sys/class/thermal/thermal_zone0/temp"
    max_threshold = 75
}
